spring.application.name=feedback-app
server.port=8080

# Database
spring.datasource.url=${DB_URL:jdbc:h2:mem:feedbackdb;MODE=MySQL;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (enabled by default for local dev; disable in production)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidationPurposeOnlyForFeedbackApplicationDevelopedInSpringBoot
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.feedback=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# Server Configuration
server.servlet.context-path=/
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
